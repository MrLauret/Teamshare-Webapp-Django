<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join a group</title>

    {% load static %}
    <link rel="shortcut icon" href="{% static 'Images/favicon.ico' %}" type="image/x-icon">
    <link rel="icon" href="{% static 'Images/favicon.ico' %}" type="image/x-icon">

    <style>
        a{
            text-decoration: none;
        }
        .group-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 400px;
            margin: 0 auto;
            background-color: #2c2c3c;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }

        .group-form input[type="text"] {
            padding: 0.8rem 1rem;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            background-color: #3b3b55;
            color: #fff;
        }
        
        .messages p {
            background-color: #4f46e5;
            color: #fff;
            padding: 0.8rem 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-weight: 500;
        }

        .group-form input[type="text"]::placeholder {
            color: #bbb;
        }

        .group-form input[type="checkbox"] {
            margin-right: 0.5rem;
        }

        .group-form label {
            display: flex;
            align-items: center;
            font-weight: 500;
            color: #fff;
        }

        .group-form button {
            padding: 0.8rem 1rem;
            border-radius: 8px;
            border: none;
            background-color: #e5dd46;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        .group-form button:hover {
            background-color: #6366f1;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <h1>Join a group</h1>

    {% include "logo.html" %}

    {% if messages %}
        <div class="messages">
            {% for msg in messages %}
                <p>{{ msg }}</p>
            {% endfor %}
        </div>
    {% endif %}

    <form action="" method="post" class="group-form">
        {% csrf_token %}
        <input type="text" name="GroupId" placeholder="Group Id" required>
        <button type="submit">Join group</button>
    </form>

    {% load static %}
    <link rel="stylesheet" href="{% static 'body.css' %}">
</body>
</html>
